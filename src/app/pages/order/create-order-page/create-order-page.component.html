<div class="create-order-page h-auto overflow-visible">
  <div class="progress-bar-container bg-gray-200 sticky py-2 top-0 z-10">
    <app-progress-bar
      [steps]="[
        { id: 0, label: 'Bestellung erstellen', tooltip: 'Die Bestellung wird erstellt.' },
        { id: 1, label: 'Bestellung erstellt', tooltip: 'Die Bestellung wurde erstellt.' },
        { id: 2, label: 'Zustimmungen erteilt', tooltip: 'Die Zustimmungen wurden erteilt.' },
        {
          id: 3,
          label: 'Dekan Zustimmung erteilt',
          tooltip: 'Die Zustimmung des Dekans wurde erteilt.',
        },
      ]"
      [currentStepIndex]="progressBarStepIndex"
    ></app-progress-bar>
  </div>
  <mat-divider></mat-divider>
  <mat-divider class="tab-divider"></mat-divider>
  <div class="general-info-container">
    <app-form-component
      [config]="generalFormConfig"
      [formGroup]="generalFormGroup"
    ></app-form-component>
    <div class="cost-center-container">
      <app-form-component
        [config]="primaryCostCenterFormConfig"
        [formGroup]="primaryCostCenterFormGroup"
      ></app-form-component>

      <app-form-component
        [config]="secondaryCostCenterFormConfig"
        [formGroup]="secondaryCostCenterFormGroup"
      ></app-form-component>
    </div>
    <div class="queries-person-container">
      <app-form-component
        [config]="queriesPersonFormConfig"
        [formGroup]="queriesPersonFormGroup"
      ></app-form-component>
    </div>
    <button
      mat-raised-button
      class="w-full tour-order-create-button"
      color="primary"
      (click)="createOrder()"
    >
      Bestellung anlegen
    </button>
  </div>
</div>
